<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Hélios</title>
        <link rel="stylesheet" type="text/css" href="projeto.css">
        <link rel="stylesheet" type="text/css" href="../reset.css">
        
    </head>
    <body>
        <header>
            <div class="container">
                <div class="cabecalho">
                   <a> <img class="logo" src="../imagens/logo.png"></a>
                </div>
                <div class="menu">
                    <nav class="list">
                        <a class="iten" href="../index.html">Energia Solar</a>
                        <a class="iten" href="Projeto.html">Projeto</a>
                        <a class="iten" href="../sobrenos/Sobrenos.html">Sobre nós</a>
                        <a class="iten" href="../contato/contato.html">Contato</a>
                    </nav>
                </div>
            </div>
        </header>
        <main>
            <div>
                <div class="container_calc">
                    <input type="text" id="display" readonly>
                    <button onclick="clearDisplay()">C</button>
                    <button onclick="addToDisplay('(')">(</button>
                    <button onclick="addToDisplay(')')">)</button>
                    <button onclick="addToDisplay('/')">/</button>
                    <br>
                    <button onclick="addToDisplay('7')">7</button>
                    <button onclick="addToDisplay('8')">8</button>
                    <button onclick="addToDisplay('9')">9</button>
                    <button onclick="addToDisplay('*')">X</button>
                    <br>
                    <button onclick="addToDisplay('4')">4</button>
                    <button onclick="addToDisplay('5')">5</button>
                    <button onclick="addToDisplay('6')">6</button>
                    <button onclick="addToDisplay('-')">-</button>
                    <br>
                    <button onclick="addToDisplay('1')">1</button>
                    <button onclick="addToDisplay('2')">2</button>
                    <button onclick="addToDisplay('3')">3</button>
                    <button onclick="addToDisplay('+')">+</button>
                    <br>
                    <button onclick="addToDisplay('0')">0</button>
                    <button onclick="addToDisplay('.')">.</button>
                    <button onclick="calculate()">=</button>
                </div>
            </div>
        </main>
        <footer class="rodape">
            <div class="roda">
                <img class="imgrodape"src="../imagens/logo.png">
            </div>
        </footer>
        <script>
            function addToDisplay(value) {
                document.getElementById("display").value += value;
            }
    
            function clearDisplay() {
                document.getElementById("display").value = "";
            }
    
            function calculate() {
                var expression = document.getElementById("display").value;
                var result = eval(expression);
                document.getElementById("display").value = result;
            }
        </script>
    </body>
</html>
