<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Energias</title>
        <link rel="stylesheet" type="text/css" href="contato.css">
        <link rel="stylesheet" type="text/css" href="reset.css">
    </head>
    <body>
        <header>
            <div class="container">
                <div class="cabecalho">
                    <img class="logo" src="logo.png">
                </div>
                <div class="menu">
                    <ul class="list">
                        <li class="iten"><a href="index.html">Energia Solar</a></li>
                        <li class="iten"><a href="Projeto.html">Projeto</a></li>
                        <li class="iten"><a href="Sobrenos.html">Sobre nós</a></li>
                        <li class="iten"><a href="contato.html">Contato</a></li>
                    </ul>
                </div>
            </div>
        </header>
        <main>
            <section class="conteudo-contato">
                <h2> Fale Conosco</h2>
                    <div class="caixa-contato">
                        <form>
                            <label for="nomesobrenome">Nome e sobrenome</label>
                            <input type="text" id="nomesobrenome" class="input-padrao" required>

                            <label for="email">Email</label>
                            <input type="email" id="email" class="input-padrao" required placeholder="seuemail@gmail.com">

                            <label for="telefone">Telefone</label>
                            <input type="tel" id="telefone" class="input-padrao" required placeholder="(XX)XXXXX-XXXX">

                            <label for="mensagem">Mensagem</label>
                            <textarea cols="100" rows="10" id="mensagem" class="input-padrao" required></textarea>

                            <input type="submit" value="Enviar" class="enviar">
                        </form>
                    </div>
             </section>
                 
        </main>
        <footer class="rodape">
            <div class="roda">
                <img class="imgrodape"src="logo.png">
            </div>
        </footer>
    </body>
</html>
